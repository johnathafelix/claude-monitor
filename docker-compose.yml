services:
  # ccusage -> JSON bridge. Reads the same ~/.claude logs the old cc-exporter did
  # and republishes them as Grafana-friendly JSON on :3001.
  ccusage-http:
    build: ./ccusage-http
    container_name: ccusage-http
    restart: unless-stopped
    volumes:
      # Map your host Claude logs folder read-only. ccusage expects a `projects/`
      # dir inside CLAUDE_CONFIG_DIR. The per-minute view parses these directly.
      # ${HOME} resolves per-machine, so this repo is portable across machines.
      - ${HOME}/.claude:/data/claude:ro
    environment:
      - CLAUDE_CONFIG_DIR=/data/claude
      # Live LiteLLM pricing (needs egress) so brand-new models are priced;
      # the bridge auto-falls back to the bundled snapshot if the fetch fails.
      # Set to 1 to force offline.
      - CCUSAGE_OFFLINE=0
      - CACHE_TTL_SECONDS=30
    ports:
      - "3001:3001"

  # OTLP sink for Claude Code's built-in telemetry (CLAUDE_CODE_ENABLE_TELEMETRY=1).
  # Captures ALL client-side counted usage — including background/classifier calls
  # that never reach the ~/.claude transcript logs — and exposes it for Prometheus.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC (Claude Code pushes here from the host)
      - "4318:4318" # OTLP HTTP

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - otel-collector
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=180d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - ccusage-http
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  # Persistent archive of the ~/.claude transcripts. Survives Claude Code's
  # ~30-day retention pruning; the usage-archive service is the only writer.
  mongo:
    image: mongodb/mongodb-atlas-local:8
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    ports:
      # 37017 on the host (27017 is already taken locally); loopback-only,
      # for mongosh/Compass debugging.
      - "127.0.0.1:37017:27017"

  # Ingests ALL ~/.claude data (transcripts incl. subagents, stats-cache,
  # history, metrics events) into Mongo every minute and serves the
  # "Claude Code Archive (Mongo)" dashboard from it on :3002.
  usage-archive:
    build: ./usage-archive
    container_name: usage-archive
    restart: unless-stopped
    depends_on:
      - mongo
    volumes:
      - ${HOME}/.claude:/data/claude:ro
    environment:
      - MONGO_URL=mongodb://mongo:27017/usage_archive?directConnection=true
      - CLAUDE_DIR=/data/claude
      - SCAN_INTERVAL_SECONDS=60
      - PRICING_REFRESH_HOURS=6
      - PRICE_1H_PREMIUM=1
      - BUCKET_TZ=UTC
    ports:
      - "3002:3002"

volumes:
  grafana-storage:
  prometheus-data:
  mongo-data:
  mongo-config:
